# Alembic configuration for Projeto Atlântico
# Documentation: https://alembic.sqlalchemy.org/

[alembic]
# Path to migration scripts
script_location = src/atlantico/storage/migrations

# URL do banco — sobrescrita em runtime por env.py via ATLANTICO_DB_URL
# ou via get_settings().database_url_sync
sqlalchemy.url = postgresql+psycopg://atlantico_app:%(ATLANTICO_DB_PASSWORD)s@localhost:5432/atlantico

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
