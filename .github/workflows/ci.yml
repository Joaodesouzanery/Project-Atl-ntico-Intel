name: CI — Projeto Atlântico

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  PYTHONPATH: src

jobs:
  # ─── Testes unitários (sem banco de dados) ──────────────────────────────────
  test-unit:
    name: Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements/dev.txt

      - name: Instalar pacote em modo editável
        run: pip install -e . --no-deps

      - name: Testes unitários (crypto + storage + geoint + finint)
        env:
          ATLANTICO_MASTER_KEY_HEX: ${{ secrets.ATLANTICO_MASTER_KEY_HEX }}
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/atlantico_test"
        run: |
          pytest tests/unit/ -m "not integration" \
            --tb=short \
            --cov=src/atlantico \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ─── Testes de integração (com PostgreSQL + PostGIS) ─────────────────────────
  test-integration:
    name: Testes de Integração
    runs-on: ubuntu-latest
    needs: test-unit

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: atlantico_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências do sistema (liboqs)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build libssl-dev

      - name: Instalar dependências Python
        run: pip install -r requirements/dev.txt

      - name: Instalar pacote em modo editável
        run: pip install -e . --no-deps

      - name: Aplicar migrations Alembic
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/atlantico_test"
          ATLANTICO_MASTER_KEY_HEX: ${{ secrets.ATLANTICO_MASTER_KEY_HEX }}
        run: |
          PYTHONPATH=src python scripts/migrate.py || echo "Migration falhou — verifique logs"

      - name: Testes de integração FININT
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/atlantico_test"
          ATLANTICO_MASTER_KEY_HEX: ${{ secrets.ATLANTICO_MASTER_KEY_HEX }}
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          pytest tests/integration/test_finint_pipeline.py -m integration \
            --tb=short -v

      - name: Testes de integração GEOINT
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/atlantico_test"
          ATLANTICO_MASTER_KEY_HEX: ${{ secrets.ATLANTICO_MASTER_KEY_HEX }}
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          pytest tests/integration/test_geoint_pipeline.py -m integration \
            --tb=short -v

  # ─── Análise estática de segurança ───────────────────────────────────────────
  security:
    name: Análise de Segurança
    runs-on: ubuntu-latest
    needs: test-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements/dev.txt

      - name: Verificar vulnerabilidades de dependências (safety)
        run: |
          pip install safety
          safety check -r requirements/base.txt || echo "Aviso: vulnerabilidades encontradas"

      - name: Análise SAST (bandit)
        run: |
          bandit -r src/atlantico/ \
            -x src/atlantico/config/ \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r src/atlantico/ \
            -x src/atlantico/config/ \
            --severity-level high \
            --confidence-level high

      - name: Lint e formatação (ruff)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Upload relatório bandit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30
